    <main class="formulario">
        <section>
            <h1 class="formulario_titulo">Contact <strong class="huevos">My eggs</strong></h1>
            <form class="formulario_form" action="https://formspree.io/f/xjvjlzqk" method="POST">
                <label for="nome" class="formulario_label">Nome:</label>
                <input type="text" id="nome" name="nome" class="formulario_input" required>

                <label for="email" class="formulario_label">Email:</label>
                <input type="email" id="email" name="_replyto" class="formulario_input" required>
                <label for="mensagem" class="formulario_label">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" class="formulario_textarea" required></textarea>
                <button type="submit" class="formulario_botao">Enviar</button>
            </form>

        </section>
    </main>
